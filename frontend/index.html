<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Code Builder | Craft Premium Components</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

  <!-- Prism.js for Syntax Highlighting -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />

  <!-- PWA Meta Tags -->
  <meta name="description" content="Gere componentes HTML/CSS/JS premium com Inteligência Artificial.">
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="icon-192.svg" sizes="192x192">
  <link rel="apple-touch-icon" href="icon-192.svg">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>AI Code Builder</h1>
      <p>Desenvolva componentes UI em segundos.</p>
    </header>

    <div id="message" class="message hidden"></div>

    <!-- Seção de Autenticação -->
    <section id="authSection" class="card auth">
      <h2 id="authTitle" style="text-align: center; margin-bottom: 5px;">Acesse sua conta</h2>
      <p id="authSubtitle" style="text-align: center; color: var(--text-dim); margin-bottom: 25px; font-size: 0.9rem;">Entre para começar a criar.</p>

      <div id="authForm">
        <input id="email" type="email" placeholder="Seu email" required>
        <input id="password" type="password" placeholder="Sua senha" required minlength="6">
        <div class="button-row">
          <button type="button" class="primary" onclick="login()">Entrar</button>
          <button type="button" class="secondary" onclick="toggleAuthMode()">Criar conta</button>
        </div>
        <button type="button" class="link-button" onclick="showForgotPassword()" style="margin-top: 15px; width: 100%;">Esqueci minha senha</button>
      </div>

      <div id="registerForm" class="hidden">
        <input id="registerEmail" type="email" placeholder="Email" required>
        <input id="registerPassword" type="password" placeholder="Senha" required minlength="6">
        <input id="confirmPassword" type="password" placeholder="Confirmar" required minlength="6">
        <div class="button-row">
          <button type="button" class="primary" onclick="register()">Cadastrar</button>
          <button type="button" class="secondary" onclick="toggleAuthMode()">Voltar</button>
        </div>
      </div>

      <div id="forgotPasswordForm" class="hidden">
        <input id="resetEmail" type="email" placeholder="Seu email" required>
        <div class="button-row">
          <button type="button" class="primary" onclick="requestPasswordReset()">Recuperar</button>
          <button type="button" class="secondary" onclick="showLoginForm()">Voltar</button>
        </div>
      </div>

      <div id="resetPasswordForm" class="hidden">
        <input id="newPassword" type="password" placeholder="Nova senha" required minlength="6">
        <input id="confirmNewPassword" type="password" placeholder="Confirmar" required minlength="6">
        <div class="button-row">
          <button type="button" class="primary" onclick="resetPassword()">Salvar</button>
          <button type="button" class="secondary" onclick="showLoginForm()">Cancelar</button>
        </div>
      </div>
    </section>

    <!-- Seção da Aplicação -->
    <section id="appSection" class="card app hidden">
      <div class="app-header">
        <div class="status-row">
          <span id="planInfo" class="status-badge">Plano Free</span>
          <span id="creditsInfo" class="status-badge">3 Créditos</span>
        </div>
        <div class="app-actions">
          <button type="button" class="primary small" onclick="checkout(event)">✨ Pro</button>
          <button type="button" class="secondary small" onclick="logout()">Sair</button>
        </div>
      </div>

      <div class="main-workspace">
        <div class="input-area" style="display: flex; flex-direction: column; gap: 10px;">
          <textarea id="prompt" placeholder="O que você quer criar? (ex: Card de produto, Botão animado...)"></textarea>
          
          <!-- Área de preview da imagem anexada -->
          <div id="imagePreviewContainer" class="hidden" style="position: relative; width: fit-content; margin-top: 5px;">
            <img id="imagePreview" src="" alt="Referência" style="max-height: 80px; border-radius: 8px; border: 1px solid var(--border);">
            <button onclick="removeImage()" style="position: absolute; top: -8px; right: -8px; background: #ef4444; color: white; border: none; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; padding: 0;">×</button>
          </div>

          <div class="input-actions" style="display: flex; justify-content: space-between; align-items: center;">
            <input type="file" id="imageInput" accept="image/*" class="hidden" onchange="handleImageSelect(event)">
            <button type="button" onclick="document.getElementById('imageInput').click()" title="Anexar Imagem" style="background: rgba(255,255,255,0.05); border: 1px dashed var(--border); border-radius: 12px; cursor: pointer; color: var(--text-muted); padding: 8px 16px; display: flex; align-items: center; justify-content: center; transition: all 0.2s;">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
              <span>Anexar Referência</span>
            </button>
            <button id="generateButton" type="button" class="primary" onclick="generate(event)">Gerar Código ⚡</button>
          </div>
        </div>

        <div class="workspace-grid">
          <div class="preview-panel">
            <header>🔍 Preview</header>
            <iframe id="preview"></iframe>
          </div>
          <div class="code-panel">
            <header>
              💻 Código
              <button onclick="copyCode()" class="link-button">📋 Copiar</button>
            </header>
            <pre><code id="output" class="language-html"></code></pre>
          </div>
        </div>
      </div>
    </section>
  </div>

  <!-- Prism.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
  
  <script src="script.js"></script>
  
  <!-- Registro do PWA Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker Registrado!', reg.scope))
          .catch(err => console.error('Erro no Service Worker:', err));
      });
    }
  </script>
</body>
</html>
