<!DOCTYPE html>
<html lang="pt-br">
<head>

  <title>Pagamento concluído</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;

      color: #f8fafc;
      font-family: Arial, sans-serif;
      padding: 20px;
      text-align: center;
    }
    .card {
      max-width: 520px;
      width: 100%;
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.3);
    }
    h1 {
      margin-bottom: 16px;
      font-size: 2rem;
    }
    p {
      color: #cbd5e1;
      margin-bottom: 24px;
    }
    a {
      display: inline-block;
      padding: 14px 22px;
      border-radius: 14px;
      background: #38bdf8;
      color: #020617;
      text-decoration: none;
      font-weight: 700;
    }

</head>
<body>
  <div class="card">
    <h1>Pagamento concluído</h1>
    <p>Obrigado! Seu plano Pro foi ativado. Volte para o app e continue gerando componentes ilimitados.</p>
